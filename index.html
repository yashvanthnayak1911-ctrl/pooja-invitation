<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notebook Invitation</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- Elegant Classy Spinning Background Effect -->
    <div class="bg-effect">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="glow-orb orb-3"></div>
        <div class="astrolabe">
            <div class="astro-ring astro-1"></div>
            <div class="astro-ring astro-2"></div>
            <div class="astro-ring astro-3"></div>
            <div class="astro-ring astro-4"></div>
            <div class="astro-ring astro-5"></div>
        </div>
    </div>

    <div class="scene">
        <div class="book" id="book">
            <!-- Page 2 (Inner Page) -->
            <div class="page base-page" id="page2" data-z="2" style="z-index: 2;">
                <div class="side">
                    <div class="content inner-content page-layout"
                        style="text-align: center; overflow-y: hidden; overflow-x: hidden; display: flex; flex-direction: column; justify-content: center; gap: 0.8vh; padding: 2vh 1vh; position: relative;">
                        <!-- Adding an inline background image matching the styling requested -->
                        <div
                            style="position: absolute; top:0; left:0; width:100%; height:100%; z-index:-1; opacity: 0.15; background-image: url('front-image.png'); background-size: cover; background-position: center; border-radius: 5px;">
                        </div>

                        <div class="header-text"
                            style="font-family: var(--font-heading), serif; font-weight: 700; font-size: clamp(1.2rem, 3.5vw, 1.4rem); color: #8b2b1a; text-shadow: 0px 1px 2px rgba(0,0,0,0.1); margin-top: -1.5vh; margin-bottom: 0.5vh; line-height: 1.3;">
                            You are cordially<br>invited to join us for<br>Poojas at our Home
                        </div>

                        <div class="date-box"
                            style="font-family: var(--font-heading), serif; font-size: clamp(1.1rem, 3.5vw, 1.35rem); font-weight: 700; color: #8b2b1a; margin: 1vh 0; letter-spacing: 0.5px; border-top: 1px solid rgba(139, 43, 26, 0.2); border-bottom: 1px solid rgba(139, 43, 26, 0.2); display: inline-block; padding: 5px 15px; align-self: center;">
                            08 March 2026, Sunday
                        </div>

                        <div class="events-container"
                            style="display: flex; flex-direction: column; gap: 1.2vh; align-items: center; width: 100%; margin-top: 0.5vh;">
                            <div class="event-bubble"
                                style="background-color: rgba(255, 248, 231, 0.9); border-top: 2px solid #dfa25b; border-bottom: 2px solid #dfa25b; border-radius: 12px; padding: 1vh 2vw; width: 90%; box-shadow: 0 3px 8px rgba(0,0,0,0.06);">
                                <p class="time"
                                    style="font-size: clamp(0.95rem, 2.8vw, 1.15rem); margin: 0; color: #b74124; font-weight: 600;">
                                    Morning 10:00 AM</p>
                                <h4 class="event-name"
                                    style="font-size: clamp(1.1rem, 3.2vw, 1.35rem); margin: 2px 0 0 0; color: #8b2b1a; font-weight: 700; font-family: var(--font-heading), serif;">
                                    Srinivasa Kalyanotsava</h4>
                            </div>

                            <div class="event-bubble"
                                style="background-color: rgba(255, 248, 231, 0.9); border-top: 2px solid #dfa25b; border-bottom: 2px solid #dfa25b; border-radius: 12px; padding: 1vh 2vw; width: 90%; box-shadow: 0 3px 8px rgba(0,0,0,0.06);">
                                <p class="time"
                                    style="font-size: clamp(0.95rem, 2.8vw, 1.15rem); margin: 0; color: #b74124; font-weight: 600;">
                                    Evening 6:00 PM</p>
                                <h4 class="event-name"
                                    style="font-size: clamp(1.1rem, 3.2vw, 1.35rem); margin: 2px 0 0 0; color: #8b2b1a; font-weight: 700; font-family: var(--font-heading), serif;">
                                    Satyanarayanaswamy Pooja</h4>
                            </div>
                        </div>

                        <div class="invite-section" style="margin-top: 1.5vh;">
                            <div
                                style="font-family: var(--font-heading), serif; font-weight: 700; font-size: clamp(1rem, 3vw, 1.25rem); color: #8b2b1a; margin-bottom: 0.5vh;">
                                Invited by: SGT Family
                            </div>
                            <div
                                style="font-weight: 600; font-size: clamp(0.85rem, 2.6vw, 1rem); line-height: 1.4; color: #a43419;">
                                Sri Mathi Lalitha &amp; Sri Ravishankar<br>
                                Sri Mathi Manjula &amp; Sri Shreyas
                            </div>
                        </div>

                        <div class="nav-button-container" style="margin-top: 1vh; padding-top: 5px;">
                            <button class="open-btn nav-btn"
                                style="font-size: 0.95rem; font-weight: 600; padding: 8px 25px; border-radius: 25px;"
                                onclick="flipBack('page1')">Previous Page</button>
                        </div>
                        <!-- Rings injected via JS -->
                    </div>
                </div>
            </div>

            <!-- Page 1 (Cover) -->
            <div class="page cover-page" id="page1" data-z="3" style="z-index: 3;">
                <div class="side front">
                    <div class="content cover-content"
                        style="justify-content: center; display: flex; flex-direction: column; align-items: center; padding: 40px;">
                        <div class="cover-image-container"
                            style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;">
                            <img src="front-image.png" alt="Lakshmi Narasimha" class="front-cover-image"
                                style="width: 100%; height: 100%; object-fit: cover; opacity: 0.85;"
                                onerror="this.src='https://images.unsplash.com/photo-1596484552834-6a58f850d0fa?auto=format&fit=crop&w=800&q=80'">
                        </div>

                        <div style="position: relative; z-index: 10; margin-top: auto; text-align: center;">

                            <p class="subtitle"
                                style="font-size: clamp(1.1rem, 4vw, 1.4rem); font-weight: 500; text-shadow: 1px 1px 5px rgba(0,0,0,0.9); font-style: italic; opacity: 0.95; color: var(--page-color);">
                            </p>
                        </div>

                        <button class="open-btn" id="openBtn" onclick="flipNext('page1')"
                            style="margin-top: auto; margin-bottom: 20px; z-index: 10;">Open Invitation</button>
                        <div class="binding-texture" style="z-index: 5;"></div>
                        <!-- Rings injected via JS -->
                    </div>
                </div>
            </div>

            <!-- Book Binding Spiral -->
            <div class="spiral-container" id="spirals">
                <!-- Spirals injected via JS -->
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
